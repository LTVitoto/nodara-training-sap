apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodara-backend
  namespace: nodara-training
  labels:
    app: nodara-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodara-backend
  template:
    metadata:
      labels:
        app: nodara-backend
    spec:
      imagePullSecrets:
        - name: nodara-private-registry-secret
      containers:
        - name: nodara-api
          image: myregistry.com/nodara-backend:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: nodara-enterprise-secrets
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: LANGFUSE_HOST
              value: "http://langfuse-svc.nodara-training.svc.cluster.local:3000"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nodara-backend-svc
  namespace: nodara-training
  labels:
    app: nodara-backend
spec:
  type: ClusterIP
  selector:
    app: nodara-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
