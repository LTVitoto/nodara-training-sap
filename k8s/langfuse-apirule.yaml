apiVersion: gateway.kyma-project.io/v1beta1
kind: APIRule
metadata:
  name: langfuse-public-api
  namespace: nodara-training
spec:
  host: langfuse-admin
  gateway: kyma-gateway.kyma-system.svc.cluster.local
  service:
    name: langfuse-svc
    port: 3000
  rules:
    - path: /.*
      methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
      accessStrategies:
        - handler: allow
